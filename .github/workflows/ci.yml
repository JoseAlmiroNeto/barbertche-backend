name: CI
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: barbertche
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/barbertche
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/barbertche
      JWT_SECRET: ci-secret-with-at-least-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-with-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npx prisma validate
      - run: npm run prisma:deploy
      - run: npx prisma migrate status
      - run: npm run check-types
      - run: npm run test:ci
      - run: npm run openapi:generate
      - name: Verificar divergência do OpenAPI
        run: git diff --exit-code -- openapi/openapi.json
